<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Automation - Persistent Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { cursor: pointer; border-radius: 4px; font-weight: bold; border: none; padding: 12px; }
        #submitBtn { background: var(--success); color: white; flex: 2; }
        #clearAllBtn { background: #95a5a6; color: white; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; font-size: 0.8rem; text-transform: uppercase; }
        .delete-btn { color: var(--danger); background: none; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-database"></i> Candidate Data Portal</h2>
    <form id="testForm">
        <div class="row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Experience</label>
                <select id="experience">
                    <option value="Junior">Junior (0-2 yrs)</option>
                    <option value="Mid">Mid (3-5 yrs)</option>
                    <option value="Senior">Senior (5+ yrs)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Remote Preference</label>
            <div style="display:flex; gap: 20px; padding: 5px 0;">
                <label><input type="radio" name="work" value="Remote" id="radioRemote"> Remote</label>
                <label><input type="radio" name="work" value="Onsite" id="radioOnsite"> Onsite</label>
            </div>
        </div>

        <div class="form-group">
            <label><input type="checkbox" id="terms"> I agree to the terms and conditions</label>
        </div>

        <div class="btn-group">
            <button type="submit" id="submitBtn">Submit Record</button>
            <button type="button" id="clearAllBtn">Clear All Records</button>
        </div>
    </form>

    <table id="resultTable">
        <thead>
            <tr><th>Name</th><th>Exp</th><th>Type</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const form = document.getElementById("testForm");
    const tableBody = document.querySelector("#resultTable tbody");

    // Load Data from Local Storage
    document.addEventListener("DOMContentLoaded", loadData);

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const entry = {
            id: Date.now(),
            name: document.getElementById("fullName").value,
            exp: document.getElementById("experience").value,
            type: document.querySelector('input[name="work"]:checked')?.value || "N/A"
        };
        saveData(entry);
        form.reset();
        loadData();
    });

    function saveData(entry) {
        const data = JSON.parse(localStorage.getItem("automation_data") || "[]");
        data.push(entry);
        localStorage.setItem("automation_data", JSON.stringify(data));
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem("automation_data") || "[]");
        tableBody.innerHTML = data.map(item => `
            <tr>
                <td>${item.name}</td>
                <td>${item.exp}</td>
                <td>${item.type}</td>
                <td><button class="delete-btn" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('') || '<tr><td colspan="4" style="text-align:center">No data found</td></tr>';
    }

    window.deleteItem = function(id) {
        let data = JSON.parse(localStorage.getItem("automation_data") || "[]");
        data = data.filter(item => item.id !== id);
        localStorage.setItem("automation_data", JSON.stringify(data));
        loadData();
    };

    document.getElementById("clearAllBtn").addEventListener("click", () => {
        if(confirm("Delete all records from local storage?")) {
            localStorage.removeItem("automation_data");
            loadData();
        }
    });
</script>
</body>
</html>
