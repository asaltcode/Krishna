<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form to Grid</title>
<style>
    body { font-family: Arial; background: #f4f4f4; }
    .container { width: 80%; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
    .form-group { margin-bottom: 10px; }
    label { font-weight: bold; }
    input, select, textarea { width: 100%; padding: 6px; margin-top: 4px; }
    button { padding: 10px; background: green; color: white; border: none; cursor: pointer; width: 100%; }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    table, th, td {
        border: 1px solid #ccc;
    }
    th, td {
        padding: 8px;
        text-align: left;
    }
    th {
        background: #28a745;
        color: white;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Registration Form</h2>

    <form id="userForm">
        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone">
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" id="city">
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" id="state">
        </div>

        <div class="form-group">
            <label>Country</label>
            <input type="text" id="country">
        </div>
<div class="form-group">
    <label>Gender</label>
    <select id="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>
</div>
        <!-- Add more fields as needed -->

        <button type="submit">Submit</button>
    </form>

    <h2>Submitted Data</h2>

    <table id="dataTable">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>City</th>
                <th>Gender</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</div>

<script>
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // Get values
    let firstName = document.getElementById("firstName").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let city = document.getElementById("city").value;
    let gender = document.getElementById("gender").value;

    // Create row
    let table = document.getElementById("dataTable").getElementsByTagName('tbody')[0];
    let newRow = table.insertRow();

    newRow.insertCell(0).innerText = firstName;
    newRow.insertCell(1).innerText = email;
    newRow.insertCell(2).innerText = phone;
    newRow.insertCell(3).innerText = city;
    newRow.insertCell(4).innerText = gender;

    // Reset form
    document.getElementById("userForm").reset();
});
</script>

</body>
</html>
