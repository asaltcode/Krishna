<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Automation - Real-Time Validation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); border-bottom: 3px solid var(--success); padding-bottom: 10px; margin-bottom: 25px; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; min-height: 90px; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        
        input[type="text"], select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
            display: none; 
        }

        input.invalid, select.invalid { border-color: var(--danger); background-color: #fffafa; }

        .option-group { display: flex; gap: 20px; align-items: center; padding: 5px 0; }
        
        button { 
            padding: 15px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 1rem;
            background: var(--success);
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }

        .table-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; font-size: 0.75rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-vial"></i> QA Validation Portal</h2>

    <form id="qaForm" novalidate>
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
            <span class="error-msg" id="nameError">Full Name is required</span>
        </div>

        <div class="form-group">
            <label for="experience">Experience Level</label>
            <select id="experience">
                <option value="">-- Select Experience --</option>
                <option value="Junior">Junior</option>
                <option value="Mid">Mid-Level</option>
                <option value="Senior">Senior</option>
            </select>
            <span class="error-msg" id="expError">Please select an experience level</span>
        </div>

        <div class="form-group">
            <label>Remote Preference</label>
            <div class="option-group">
                <label><input type="radio" name="workType" value="Remote" id="radioRemote"> Remote</label>
                <label><input type="radio" name="workType" value="Onsite" id="radioOnsite"> Onsite</label>
            </div>
            <span class="error-msg" id="workError">Remote Preference is required</span>
        </div>

        <div class="form-group" style="min-height: 60px;">
            <div class="option-group">
                <label><input type="checkbox" id="termsCheckbox"> I agree to terms and conditions</label>
            </div>
            <span class="error-msg" id="termsError">Checkbox agreement is required</span>
        </div>

        <button type="submit" id="submitBtn">Submit Record</button>
    </form>

    <div class="table-section">
        <table id="resultsTable">
            <thead><tr><th>Name</th><th>Exp</th><th>Work</th><th>Status</th></tr></thead>
            <tbody><tr><td colspan="4" style="text-align:center; color:#999;">No records found.</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById("qaForm");
    
    // --- Real-Time Listeners ---

    // 1. Textbox: Remove error on input
    document.getElementById("fullName").addEventListener("input", function() {
        if (this.value.trim() !== "") {
            document.getElementById("nameError").style.display = "none";
            this.classList.remove("invalid");
        }
    });

    // 2. Dropdown: Remove error on change
    document.getElementById("experience").addEventListener("change", function() {
        if (this.value !== "") {
            document.getElementById("expError").style.display = "none";
            this.classList.remove("invalid");
        }
    });

    // 3. Radio Buttons: Remove error on click
    document.querySelectorAll('input[name="workType"]').forEach(radio => {
        radio.addEventListener("change", function() {
            document.getElementById("workError").style.display = "none";
        });
    });

    // 4. Checkbox: Remove error on check
    document.getElementById("termsCheckbox").addEventListener("change", function() {
        if (this.checked) {
            document.getElementById("termsError").style.display = "none";
        }
    });

    // --- Submit Logic ---
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        let isValid = true;

        const fullName = document.getElementById("fullName");
        const experience = document.getElementById("experience");
        const workSelected = document.querySelector('input[name="workType"]:checked');
        const terms = document.getElementById("termsCheckbox");

        if (!fullName.value.trim()) {
            document.getElementById("nameError").style.display = "block";
            fullName.classList.add("invalid");
            isValid = false;
        }

        if (experience.value === "") {
            document.getElementById("expError").style.display = "block";
            experience.classList.add("invalid");
            isValid = false;
        }

        if (!workSelected) {
            document.getElementById("workError").style.display = "block";
            isValid = false;
        }

        if (!terms.checked) {
            document.getElementById("termsError").style.display = "block";
            isValid = false;
        }

        if (isValid) {
            const tableBody = document.querySelector("#resultsTable tbody");
            const newRow = `<tr><td>${fullName.value}</td><td>${experience.value}</td><td>${workSelected.value}</td><td style="color:green; font-weight:bold;">Success</td></tr>`;
            if(tableBody.innerText.includes("No records")) tableBody.innerHTML = "";
            tableBody.innerHTML += newRow;
            form.reset();
            //alert("Record successfully added!");
        }
    });
</script>
</body>
</html>
