<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Automation - Persistent Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); border-bottom: 3px solid var(--success); padding-bottom: 10px; margin-bottom: 25px; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; min-height: 90px; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        
        input[type="text"], select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
            display: none; 
        }

        input.invalid, select.invalid { border-color: var(--danger); background-color: #fffafa; }

        .option-group { display: flex; gap: 20px; align-items: center; padding: 5px 0; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 10px; }
        button { 
            padding: 15px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        #submitBtn { background: var(--success); color: white; flex: 2; }
        #clearAllBtn { background: #95a5a6; color: white; flex: 1; }
        button:hover { opacity: 0.9; }

        .table-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; font-size: 0.75rem; text-transform: uppercase; }
        
        .delete-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form id="qaForm" novalidate>
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
            <span class="error-msg" id="nameError">Full Name is required</span>
        </div>

        <div class="form-group">
            <label for="experience">Experience Level</label>
            <select id="experience">
                <option value="">-- Select Experience --</option>
                <option value="Junior">Junior</option>
                <option value="Mid">Mid-Level</option>
                <option value="Senior">Senior</option>
            </select>
            <span class="error-msg" id="expError">Please select an experience level</span>
        </div>

        <div class="form-group">
            <label>Remote Preference</label>
            <div class="option-group">
                <label><input type="radio" name="workType" value="Remote" id="radioRemote"> Remote</label>
                <label><input type="radio" name="workType" value="Onsite" id="radioOnsite"> Onsite</label>
            </div>
            <span class="error-msg" id="workError">Remote Preference is required</span>
        </div>

        <div class="form-group" style="min-height: 60px;">
            <div class="option-group">
                <label><input type="checkbox" id="termsCheckbox"> I agree to the terms</label>
            </div>
            <span class="error-msg" id="termsError">I agree to terms is required</span>
        </div>

        <div class="btn-group">
            <button type="submit" id="submitBtn">Submit Record</button>
            <button type="button" id="clearAllBtn">Clear All</button>
        </div>
    </form>

    <div class="table-section">
        <table id="resultsTable">
            <thead>
                <tr><th>Name</th><th>Exp</th><th>Work</th><th>Action</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById("qaForm");
    const tableBody = document.querySelector("#resultsTable tbody");

    // --- Data Persistence Logic ---
    const loadData = () => {
        const data = JSON.parse(localStorage.getItem("automation_records") || "[]");
        tableBody.innerHTML = data.length ? data.map(item => `
            <tr>
                <td>${item.name}</td>
                <td>${item.exp}</td>
                <td>${item.type}</td>
                <td><button class="delete-btn" onclick="deleteItem(${item.id})"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
        `).join('') : '<tr><td colspan="4" style="text-align:center; color:#999;">No records found.</td></tr>';
    };

    window.deleteItem = (id) => {
        let data = JSON.parse(localStorage.getItem("automation_records") || "[]");
        data = data.filter(item => item.id !== id);
        localStorage.setItem("automation_records", JSON.stringify(data));
        loadData();
    };

    document.getElementById("clearAllBtn").addEventListener("click", () => {
        if (confirm("Permanently clear all local storage data?")) {
            localStorage.removeItem("automation_records");
            loadData();
        }
    });

    // --- Real-Time Validation Listeners ---
    document.getElementById("fullName").addEventListener("input", function() {
        if (this.value.trim() !== "") {
            document.getElementById("nameError").style.display = "none";
            this.classList.remove("invalid");
        }
    });

    document.getElementById("experience").addEventListener("change", function() {
        if (this.value !== "") {
            document.getElementById("expError").style.display = "none";
            this.classList.remove("invalid");
        }
    });

    document.querySelectorAll('input[name="workType"]').forEach(r => {
        r.addEventListener("change", () => document.getElementById("workError").style.display = "none");
    });

    document.getElementById("termsCheckbox").addEventListener("change", function() {
        if (this.checked) document.getElementById("termsError").style.display = "none";
    });

    // --- Form Submission ---
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        let isValid = true;

        const name = document.getElementById("fullName");
        const exp = document.getElementById("experience");
        const work = document.querySelector('input[name="workType"]:checked');
        const terms = document.getElementById("termsCheckbox");

        if (!name.value.trim()) {
            document.getElementById("nameError").style.display = "block";
            name.classList.add("invalid");
            isValid = false;
        }
        if (exp.value === "") {
            document.getElementById("expError").style.display = "block";
            exp.classList.add("invalid");
            isValid = false;
        }
        if (!work) {
            document.getElementById("workError").style.display = "block";
            isValid = false;
        }
        if (!terms.checked) {
            document.getElementById("termsError").style.display = "block";
            isValid = false;
        }

        if (isValid) {
            const data = JSON.parse(localStorage.getItem("automation_records") || "[]");
            data.push({ id: Date.now(), name: name.value, exp: exp.value, type: work.value });
            localStorage.setItem("automation_records", JSON.stringify(data));
            form.reset();
            loadData();
        }
    });

    document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
